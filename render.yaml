services:
  - type: web
    name: wuan-garry-lotto
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/lotto.db
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: lotto-data
      mountPath: /opt/render/project/src
      sizeGB: 1
